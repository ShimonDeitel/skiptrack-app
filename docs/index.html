<!doctype html><html><head><meta charset="utf-8"><title>Skiptrack</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:#1B1B1E;color:#f2f2f2;font-family:-apple-system,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center}
.wrap{max-width:560px;padding:40px}
h1{color:#E4572E;font-size:2.4rem;margin-bottom:0.2em}
p{line-height:1.5;color:#cfcfcf}
a{color:#E4572E}
.badge{display:inline-block;margin-top:24px;padding:10px 22px;border:1px solid #E4572E;border-radius:24px;color:#E4572E;text-decoration:none}

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #E4572E55 0%, #E4572E00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style></head><body>
<div class="orb"></div>
<div class="wrap">
<h1>Skiptrack</h1>
<p>Log class attendance and absences against your allowed limit.</p>
<p>Attendance/absence counter per class. Upgrade to Pro for alerts when nearing absence limit.</p>
<a class="badge" href="privacy.html">Privacy</a> &nbsp; <a class="badge" href="terms.html">Terms</a>
<p style="margin-top:32px;font-size:0.85rem">Contact: s0533495227@gmail.com</p>
</div></body></html>
